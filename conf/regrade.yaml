defaults:
  - _self_

hydra:
  run:
    dir: outputs/re-grade/re-grade-${now:%Y-%m-%d_%H-%M-%S}

dataset:
  path: "data/re-grade/regrading_input.jsonl"
  limit: null
  question_type:
  - text-only
  - multi-to-text
  - image-to-text

grader:
  enabled: true
  model_name: gemini-3-flash-preview
  backend: google
  generate_config:
    reasoning_effort: minimal
